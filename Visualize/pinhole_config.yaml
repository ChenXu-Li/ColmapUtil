# Pinhole 重建结果可视化专用配置（对应 visualize_pinhole.sh）
#
# 无命令行参数时，visualize_pinhole.sh 会从这里读取默认值。

# COLMAP 工作空间路径（必须存在 sparse/0 目录）
workspace_path: "/home/lcx/data/test_frame15"
# workspace_path: "/home/lcx/data/colmap_frame15"

# 可选：显式指定稀疏结果路径（不填则使用 workspace_path/sparse/0）
# sparse_path: "/home/lcx/data/test_frame15/2"

# 可选：显式指定稠密点云路径（不填则在 workspace_path 下自动搜索 fused.ply）
# dense_ply: "/root/autodl-tmp/data/MobilePhone/BridgeB/colmap/fused.ply"

# viser 端口（等价于脚本中的 -p / --port）
port: 8080

# 稀疏 / 稠密点云点大小
sparse_point_size: 0.01
dense_point_size: 0.005

# 相机 frustum 缩放
camera_scale: 0.05

# 是否隐藏各类元素（等价于脚本中的 --hide-xxx 开关）
hide_sparse_points: false
hide_cameras: false
hide_dense_points: false

# 是否在相机锥体旁显示相机编号（image_id）
show_camera_ids: true

# 是否在相机锥体上贴合对应图片（默认开启，可能较慢）
frustum_images: true

# （可选）图片根目录：默认使用 workspace_path/images
# images_root: "/home/lcx/data/test_frame15/images"

# 贴图缩放：贴合到锥体上的图片最大边长（像素）
frustum_image_max_size: 256

# 性能控制：每隔多少张图显示一次
frustum_image_every: 1

# 相机锥体/贴图方向的 roll 修正角（绕相机光轴 +Z，单位: 度）
# 你观察到“应绕指向轴顺时针旋转 90°”；而可视化代码使用右手系正角旋转，
# 因此这里默认取 +90 来匹配你当前数据的贴图朝向。
frustum_roll_deg: 0

